# Crowdin config: the NetMod English catalog is the source; translated catalogs are
# written back beside it using the game's base-game locale names.
#
# Only the NetMod edition is wired to Crowdin. The plugin (.scmod) edition ships a small
# fixed set of languages its base game supports (en-US/pt-BR/ru-RU/vi-VN/zh-CN) and is NOT
# managed here: Crowdin exports every project target language per source file (the
# per-file languages_mapping only renames, it does not filter), which would fill the plugin
# folder with orphan languages its base game cannot display. Update the plugin catalogs
# manually from the NetMod ones when they change.
files:
  # NetMod (.netmod) edition — 联机版
  - source: /src/SurvivalcraftTravelMap/Assets/Lang/en-US.json
    translation: /src/SurvivalcraftTravelMap/Assets/Lang/%locale%.json
    languages_mapping:
      locale:
        es-MX: es-MX
        pt-BR: pt-BR
        ru: ru-RU
        zh-CN: zh-CN
        vi: vi-VN
        id: id-ID
        tr: tr-TR
        ja: ja-JP
        ko: ko-KR
        fr: fr-FR
        de: de-DE
        it: it-IT
        pl: pl-PL
        hi: hi-IN
        th: th-TH
        uk: uk-UA
        ar: ar-SA
