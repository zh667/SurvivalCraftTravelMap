# Crowdin config: the English catalog is the source; translated catalogs are written
# back beside it using each edition's base-game locale names. Two source files (NetMod
# and plugin) share identical strings, so enable duplicate-string sharing in the Crowdin
# project so they are translated only once.
files:
  # NetMod (.netmod) edition — 联机版
  - source: /src/SurvivalcraftTravelMap/Assets/Lang/en-US.json
    translation: /src/SurvivalcraftTravelMap/Assets/Lang/%locale%.json
    languages_mapping:
      locale:
        es-MX: es-MX
        pt-BR: pt-BR
        ru: ru-RU
        zh-CN: zh-CN
        vi: vi-VN
        id: id-ID
        tr: tr-TR
        ja: ja-JP
        ko: ko-KR
        fr: fr-FR
        de: de-DE
        it: it-IT
        pl: pl-PL
        hi: hi-IN
        th: th-TH
        uk: uk-UA
        ar: ar-SA

  # Plugin (.scmod) edition — 插件版. Ships only locales the plugin edition's base game
  # provides, so no orphan language entries appear in the in-game language list. Spanish
  # (es-419) is intentionally omitted for now. Romanian (ro-RO) is supported by the base
  # game and can be added here once Crowdin has Romanian translations.
  - source: /plugin/SurvivalcraftTravelMap/Assets/Lang/en-US.json
    translation: /plugin/SurvivalcraftTravelMap/Assets/Lang/%locale%.json
    languages_mapping:
      locale:
        pt-BR: pt-BR
        ru: ru-RU
        vi: vi-VN
        zh-CN: zh-CN
